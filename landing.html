<html>

<head>

<body class="antialiased">

  <main>

```
<!-- HERO SECTION -->
<div class="relative pt-16 pb-32 flex content-center items-center justify-center"
  style="min-height: 75vh; background: linear-gradient(135deg, #000000, #1a1a1a);">

  <div class="container mx-auto text-center">
    <h1 class="text-5xl font-bold gold-text">
      Understand the emotions behind the words 😊
    </h1>
    <p class="mt-4 text-lg text-yellow-200">
      Analyze emotions and opinions from your text using AI-powered sentiment analysis.
    </p>
  </div>
</div>

<!-- MAIN SECTION -->
<section class="py-20">

  <div class="text-center mb-10">
    <h1 class="text-4xl font-bold gold-text">Text Sentiment Prediction</h1>
  </div>

  <div class="container mx-auto px-4">

    <div class="flex flex-wrap justify-center gap-10">

      <!-- INPUT BOX -->
      <div class="w-full md:w-4/12 black-card p-6 rounded-xl shadow-xl">

        <form id="predictionForm">

          <div class="py-3">
            <span class="text-sm gold-text">Upload CSV File</span>
            <input type="file" id="csvFileInput" accept=".csv"
              class="w-full p-2 rounded-lg mt-1" />
          </div>

          <div class="py-3">
            <span class="text-sm gold-text">Enter Text</span>
            <textarea id="textInput" placeholder="Enter text..."
              class="w-full p-2 rounded-lg mt-1"></textarea>
          </div>

          <button type="button" onclick="predict()"
            class="mt-4 w-full py-3 rounded-lg gold-bg font-bold hover:opacity-80">
            Predict
          </button>

        </form>
      </div>

      <!-- RESULT BOX -->
      <div class="w-full md:w-4/12 black-card p-6 rounded-xl shadow-xl">

        <h2 class="text-2xl mb-4 gold-text underline">Prediction Result</h2>
        <div id="predictionResult" class="p-3 border gold-border rounded"></div>

        <h2 class="text-2xl mt-6 mb-4 gold-text underline">Graph Result</h2>
        <div id="graphContainer" class="p-3 border gold-border rounded"></div>

        <button id="downloadBtn" style="display:none"
          class="mt-6 w-full py-3 rounded-lg gold-bg font-bold hover:opacity-80">
          Download Predictions
        </button>

      </div>

    </div>

  </div>
</section>
```

  </main>

  <!-- FOOTER -->

  <footer class="bg-black text-center py-4 border-t border-yellow-500">
    <p class="gold-text">© Sentiment Analysis Project</p>
  </footer>

</body>

<script>
  function predict() {
    var csvFileInput = document.getElementById("csvFileInput");
    var textInput = document.getElementById("textInput");
    var predictionResult = document.getElementById("predictionResult");
    var graphContainer = document.getElementById("graphContainer");

    if (csvFileInput.files.length > 0) {
      var formData = new FormData();
      formData.append("file", csvFileInput.files[0]);

      fetch("http://localhost:5000/predict", {
        method: "POST",
        body: formData
      })
        .then(response => {
          if (response.headers.get('X-Graph-Exists') === 'true') {
            var graphData = response.headers.get('X-Graph-Data');
            displayGraph(graphData);
          }
          return response.blob();
        })
        .then(blob => {
          document.getElementById("downloadBtn").style.display = "block";
          document.getElementById("downloadBtn").onclick = function () {
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = "Predictions.csv";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          };
        });
    } else if (textInput.value.trim() !== "") {
      fetch("http://localhost:5000/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ "text": textInput.value.trim() })
      })
        .then(response => response.json())
        .then(data => {
          predictionResult.innerHTML =
            "<span class='gold-text'>Prediction:</span> " + data.prediction;
        });
    }
  }

  function displayGraph(graphData) {
    var graphUrl = "data:image/png;base64," + graphData;
    var img = document.createElement('img');
    img.src = graphUrl;
    img.style.marginTop = "10px";
    document.getElementById("graphContainer").appendChild(img);
  }
</script>

</html>
